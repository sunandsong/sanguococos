<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>深渊 Demo · 黄泉路</title>
<style>
  html,body{margin:0;padding:0;background:#0e0a16;height:100%;overflow:hidden;touch-action:none}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%}
  canvas{background:#161020;max-height:100vh;max-width:100vw}
  #tip{position:fixed;left:10px;top:8px;color:#a9b;font:12px/1.6 monospace;pointer-events:none;white-space:pre}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="720" height="1280"></canvas></div>
<div id="tip">A/D 移动/转向 · S 俯冲加速 · 松开=常速 · 钻气流柱=减速悬停 · W/空格 跳 · J 攻击(地面)
下坠两难:俯冲甩开黑无常,但白无常的锁链圈要从圈心穿过——快了穿不准,慢了被追上!
流程:电梯口跳崖→下坠→接引亭→无常追击→魂雾落地→黄泉路→鬼门关(牛头马面) · G 无敌(默认开)</div>
<script>
'use strict';
const cv=document.getElementById('cv'), g=cv.getContext('2d');
const W=720,H=1280;

// ── 世界(y 向下) ──
const SHAFT={x0:80,x1:640};
const CLIFF_Y=600;                 // 崖沿地面
const TER={y:8200,x0:140,x1:580};  // 接引亭(迎魂歇脚)
const ZB0=8900, ZB1=17400;         // 无常追击区
const FLY=18000;                   // 魂雾层(减速托底)
const ROADY=18800;                 // 黄泉路地面
const ROAD_X1=3960;                // 路尽头
const GATE_X=3820;
const grounds=[
  {x0:-60,x1:520,y:CLIFF_Y},
  {x0:TER.x0,x1:TER.x1,y:TER.y},
  {x0:460,x1:ROAD_X1,y:ROADY},
];
const rnd=s=>((Math.sin(s*127.1)*43758.5)%1+1)%1;
// 岩刺(左右壁伸出)
const rocks=[];
for(let y=1400,i=0;y<17300;y+=420+rnd(i)*260,i++){
  if(Math.abs(y-TER.y)<500)continue;
  rocks.push({side:rnd(i*3)<0.5?0:1,y,len:130+rnd(i*7)*150});
}
// 气流柱
const drafts=[];
for(let y=2000,i=0;y<17000;y+=1500+rnd(i*11)*600,i++){
  if(Math.abs(y-TER.y)<600)continue;
  drafts.push({x:180+rnd(i*13)*360,y0:y,y1:y+620,w:120});
}
// 白无常锁链圈(追击区)
const rings=[];
for(let y=9600,i=0;y<17000;y+=950,i++)rings.push({y,ph:rnd(i*17)*6,passed:0});
// 黄泉路怨魂
const wisps=[[900],[1300],[1750],[2250],[2700]].map((a,i)=>({x:a[0],y:ROADY-60,ph:i*2,hp:2,hit:0,dead:0}));
// 双Boss
const BULL={x:3300,y:ROADY,hp:20,st:'idle',t:1.5,dir:-1,hit:0,dead:0};
const HORSE={x:3650,y:ROADY,hp:20,st:'idle',t:3,dir:-1,hit:0,dead:0,sx:0};

// ── 玩家 ──
const P={x:200,y:CLIFF_Y,vx:0,vy:0,dir:1,onG:1,jumps:0,hp:3,inv:0,atkT:0,dead:0,win:0};
let camX=0,camY=0,coins=0,GOD=1,shake=0,T=0,slow=0;
let msg='',msgT=0;
let black=null;            // 黑无常 {y}
let cpi=0;
const CPS=[{x:200,y:CLIFF_Y},{x:360,y:TER.y},{x:560,y:ROADY},{x:3080,y:ROADY}];
const FLAGS={jumped:0,ter:0,zb:0,flower:0,road:0,boss:0};
function msgQ(t){msg=t;msgT=2.6;}
const keys={};
onkeydown=e=>{keys[e.code]=1;
  if(['Space','KeyW'].includes(e.code)){e.preventDefault();jump();}
  if(e.code==='KeyJ')atk();
  if(e.code==='KeyG')GOD=!GOD;};
onkeyup=e=>keys[e.code]=0;
let touchL={on:0,x:0};
cv.addEventListener('touchstart',ev=>{const r=cv.getBoundingClientRect();
  for(const t of ev.changedTouches){const x=(t.clientX-r.left)/r.width*W,y=(t.clientY-r.top)/r.height*H;
    if(x<W/2&&y>H*0.5){touchL={on:1,x,id:t.identifier};}
    else if(x>W*0.72&&y>H*0.72)atk();
    else jump();}
  if(P.dead||P.win)restart();ev.preventDefault();},{passive:false});
cv.addEventListener('touchmove',ev=>{const r=cv.getBoundingClientRect();
  for(const t of ev.changedTouches){if(touchL.on&&t.identifier===touchL.id)touchL.x=(t.clientX-r.left)/r.width*W;}
  ev.preventDefault();},{passive:false});
cv.addEventListener('touchend',ev=>{for(const t of ev.changedTouches)if(t.identifier===touchL.id)touchL.on=0;
  ev.preventDefault();},{passive:false});

function jump(){
  if(P.dead||P.win){restart();return;}
  if(P.onG){P.vy=-620;P.onG=0;P.jumps=1;}
  else if(P.jumps<2){P.vy=-620;P.jumps++;}
}
function atk(){
  if(P.dead||P.win){restart();return;}
  if(P.onG&&P.atkT<=0)P.atkT=0.26;
}
function restart(){
  if(!P.dead&&!P.win)return;
  P.dead=0;P.win=0;P.hp=3;P.vx=0;P.vy=0;
  const c=CPS[cpi];P.x=c.x;P.y=c.y;P.onG=1;
  black=null;
  if(cpi<3){BULL.hp=20;BULL.dead=0;BULL.st='idle';BULL.x=3300;
    HORSE.hp=20;HORSE.dead=0;HORSE.st='idle';HORSE.x=3650;FLAGS.boss=0;}
}
function hurt(n){ if(GOD){shake=4;return;} if(P.inv>0||P.dead)return;
  P.hp-=n;P.inv=1.3;shake=9; if(P.hp<=0){P.hp=0;P.dead=1;} }
const parts=[];
function spark(x,y,col,n,sp){for(let i=0;i<n;i++){const a=Math.random()*6.283;
  parts.push({x,y,vx:Math.cos(a)*sp*100,vy:Math.sin(a)*sp*100,life:0,max:0.5+Math.random()*0.3,col});}}
const gapX=r=>360+Math.sin(T*0.9+r.ph)*190;

function step(dt){
  T+=dt;
  if(msgT>0)msgT-=dt;
  if(P.inv>0)P.inv-=dt;
  if(P.atkT>0)P.atkT-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*30);
  if(P.dead||P.win)return;

  const mv=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0)
    ||(touchL.on?Math.sign(touchL.x-(W/4)):0);
  if(mv)P.dir=mv;
  const fast=keys.KeyS||keys.ArrowDown;

  // 物理
  P.vx=mv*(P.onG?250:300);
  P.x+=P.vx*dt;
  // 气流柱?
  let inDraft=false;
  if(!P.onG)for(const d of drafts){
    if(P.x>d.x-d.w/2&&P.x<d.x+d.w/2&&P.y>d.y0&&P.y<d.y1){inDraft=true;break;}
  }
  const inFog=P.y>FLY&&P.y<ROADY-40;
  if(inDraft){P.vy+=(-220-P.vy)*Math.min(1,dt*4);}          // 悬停/缓升
  else if(inFog){P.vy+=(300-P.vy)*Math.min(1,dt*3);}       // 魂雾减速
  else {
    P.vy+=1500*dt;
    const cap=P.onG?1e9:(fast?1700:1150);
    if(P.vy>cap)P.vy=cap;
  }
  const py0=P.y;
  P.y+=P.vy*dt;
  // 井壁(只管魂雾层以上的下坠区;路面上跳跃不再被夹回井道)
  if(P.y>CLIFF_Y+40&&P.y<FLY)P.x=Math.max(SHAFT.x0+18,Math.min(SHAFT.x1-18,P.x));
  if(P.y>=FLY)P.x=Math.max(480,Math.min(ROAD_X1-30,P.x));
  // 落地
  P.onG=0;
  if(P.vy>=0)for(const gr of grounds){
    if(P.x>gr.x0-8&&P.x<gr.x1+8&&py0<=gr.y+4&&P.y>=gr.y){
      P.y=gr.y;P.vy=0;P.onG=1;P.jumps=0;break;}
  }
  // 岩刺碰撞
  if(!P.onG)for(const rk of rocks){
    const rx0=rk.side?SHAFT.x1-rk.len:SHAFT.x0, rx1=rk.side?SHAFT.x1:SHAFT.x0+rk.len;
    if(P.y>rk.y-24&&P.y<rk.y+34&&P.x>rx0-14&&P.x<rx1+14){
      hurt(1);P.vy=Math.min(P.vy,500);
      P.x=rk.side?rx0-30:rx1+30;
      spark(P.x,P.y,'#d8a0a0',8,1.2);
    }
  }
  // 锁链圈
  for(const r of rings){
    if(!r.passed&&py0<=r.y&&P.y>r.y){
      r.passed=1;
      if(Math.abs(P.x-gapX(r))<64){coins++;spark(P.x,P.y,'#c8e8ff',10,1.4);msgQ('穿圈!+1');}
      else {hurt(1);P.vy*=0.35;spark(P.x,P.y,'#e8e8ff',12,1.6);}
    }
  }
  // 黑无常追击
  if(!FLAGS.zb&&P.y>ZB0){FLAGS.zb=1;black={y:P.y-760};msgQ('黑无常追上来了!俯冲甩开他!');}
  if(black){
    black.y+=1280*dt;
    if(black.y<P.y-1500)black.y=P.y-1500;
    if(P.y-black.y<150){black.tick=(black.tick||0)-dt;
      if(black.tick<=0){black.tick=0.8;hurt(1);}}
    if(P.y>ZB1){black=null;msgQ('"……鬼门关见。"');}
  }
  // 阶段提示/检查点
  if(!FLAGS.jumped&&!P.onG&&P.y>CLIFF_Y+300){FLAGS.jumped=1;msgQ('坠入黄泉——A/D 转向,S 俯冲,钻气流减速');}
  if(!FLAGS.ter&&P.onG&&Math.abs(P.y-TER.y)<6){FLAGS.ter=1;cpi=1;msgQ('接引亭…歇口气,下面还深');}
  if(!FLAGS.flower&&P.y>FLY){FLAGS.flower=1;msgQ('魂雾托住了你…快到底了');}
  if(!FLAGS.road&&P.onG&&P.y>=ROADY-5){FLAGS.road=1;cpi=2;msgQ('黄泉路——尽头就是鬼门关');}
  if(!FLAGS.boss&&P.x>3080&&P.y>=ROADY-5){FLAGS.boss=1;cpi=3;msgQ('牛头马面拦路!');}

  // 攻击命中
  if(P.atkT>0.1){
    const ax=P.x+P.dir*60;
    for(const w2 of wisps){
      if(w2.dead)continue;
      if(Math.abs(ax-w2.x)<70&&Math.abs(P.y-40-w2.y)<80){
        w2.hp--;w2.hit=0.2;P.atkT=0.08;spark(w2.x,w2.y,'#cfe0ff',8,1.3);
        if(w2.hp<=0){w2.dead=1;coins+=2;spark(w2.x,w2.y,'#ffe9b0',12,1.6);}
      }
    }
    for(const B of [BULL,HORSE]){
      if(B.dead)continue;
      if(Math.abs(ax-B.x)<90&&Math.abs(P.y-B.y)<90){
        B.hp--;B.hit=0.18;P.atkT=0.08;shake=5;spark(B.x,B.y-70,'#ffd7d0',10,1.5);
        if(B.hp<=0){B.dead=1;spark(B.x,B.y-60,'#ffe9b0',24,2.2);
          msgQ(B===BULL?'牛头倒了!':'马面倒了!');
          if(BULL.dead&&HORSE.dead){slow=1.2;msgQ('鬼门关…开了');}
        }
      }
    }
  }
  // 怨魂 AI
  for(const w2 of wisps){
    if(w2.dead)continue;
    w2.ph+=dt;
    if(Math.abs(P.x-w2.x)<400&&P.y>ROADY-200){
      w2.x+=Math.sign(P.x-w2.x)*46*dt;
      w2.y=ROADY-60+Math.sin(w2.ph*2)*20;
      if(Math.abs(P.x-w2.x)<36&&Math.abs(P.y-40-w2.y)<60)hurt(1);
    }
  }
  // 牛头:蓄力冲撞(跳过它)
  if(FLAGS.boss&&!BULL.dead){
    BULL.t-=dt;if(BULL.hit>0)BULL.hit-=dt;
    if(BULL.st==='idle'){
      BULL.dir=Math.sign(P.x-BULL.x)||-1;
      BULL.x+=BULL.dir*40*dt;
      if(BULL.t<=0){BULL.st='pre';BULL.t=0.8;}
    } else if(BULL.st==='pre'){
      if(BULL.t<=0){BULL.st='dash';BULL.t=0.62;BULL.dir=Math.sign(P.x-BULL.x)||-1;}
    } else if(BULL.st==='dash'){
      BULL.x+=BULL.dir*560*dt;
      if(Math.abs(P.x-BULL.x)<62&&P.y>ROADY-90)hurt(1);
      if(BULL.t<=0){BULL.st='idle';BULL.t=2.6+Math.random();}
    }
    BULL.x=Math.max(3120,Math.min(GATE_X-60,BULL.x));
  }
  // 马面:长枪突刺(预警线→刺)
  if(FLAGS.boss&&!HORSE.dead){
    HORSE.t-=dt;if(HORSE.hit>0)HORSE.hit-=dt;
    if(HORSE.st==='idle'){
      const want=P.x+(P.x<HORSE.x?260:-260);
      HORSE.x+=Math.sign(want-HORSE.x)*90*dt;
      HORSE.dir=Math.sign(P.x-HORSE.x)||-1;
      if(HORSE.t<=0){HORSE.st='aim';HORSE.t=0.7;HORSE.sx=P.x;}
    } else if(HORSE.st==='aim'){
      if(HORSE.t<=0){HORSE.st='stab';HORSE.t=0.3;}
    } else if(HORSE.st==='stab'){
      const tip=HORSE.x+HORSE.dir*180;
      if(Math.abs(P.x-tip)<130&&P.y>ROADY-70)hurt(1);   // 跳起可躲
      if(HORSE.t<=0){HORSE.st='idle';HORSE.t=2.2+Math.random();}
    }
    HORSE.x=Math.max(3120,Math.min(GATE_X-40,HORSE.x));
  }
  // 过门
  if(BULL.dead&&HORSE.dead&&P.x>GATE_X+60)P.win=1;

  // 相机
  camY+=((P.y-H*0.4)-camY)*Math.min(1,dt*6);
  camY=Math.max(0,camY);
  const cxT=P.y>=ROADY-300?Math.max(0,Math.min(ROAD_X1-W,P.x-W*0.45)):0;
  camX+=(cxT-camX)*Math.min(1,dt*5);

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life+=dt;
    if(p.life>p.max){parts.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;}
}

const sx=wx=>wx-camX;
const sy=wy=>wy-camY;

function draw(){
  g.save();
  if(shake>0)g.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  // 背景:深渊紫黑,越深越红(接近彼岸花)
  const depth=Math.min(1,camY/(ROADY-H));
  const sky=g.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,`rgb(${22+depth*30|0},${16+depth*6|0},${34+depth*10|0})`);
  sky.addColorStop(1,`rgb(${30+depth*50|0},${18+depth*8|0},${40+depth*14|0})`);
  g.fillStyle=sky;g.fillRect(0,0,W,H);
  // 幽尘
  g.fillStyle='rgba(180,160,220,0.25)';
  for(let i=0;i<14;i++){
    const dx2=(i*131+Math.sin(T*0.6+i)*30)%W;
    const dy2=((i*257-camY*0.2)%(H+100)+(H+100))%(H+100)-50;
    g.beginPath();g.arc(dx2,dy2,2,0,7);g.fill();
  }

  // ── 井壁(下坠区) ──
  if(camY<ROADY-H*0.5){
    for(const side of [0,1]){
      const wx=side?SHAFT.x1:SHAFT.x0;
      g.fillStyle='#241a2c';
      g.fillRect(side?wx:0,0,side?W-wx:wx,H);
      g.strokeStyle='#1a1220';g.lineWidth=5;
      for(let wy=Math.floor(camY/260)*260;wy<camY+H+260;wy+=260){
        const ly=sy(wy);
        g.beginPath();g.moveTo(side?wx:0,ly);
        g.quadraticCurveTo(side?wx+40:wx-40,ly+30,side?W:wx,ly-10);g.stroke();
      }
      // 壁上磷火点缀(幽绿)
      for(let wy=Math.floor(camY/700)*700+(side?350:0);wy<camY+H+400;wy+=700){
        const ly=sy(wy);
        if(ly<-40||ly>H+40)continue;
        const fl=0.4+0.3*Math.sin(T*3+wy);
        g.fillStyle=`rgba(140,230,190,${fl})`;
        g.beginPath();g.arc(side?wx+26:wx-26,ly+Math.sin(T*2+wy)*5,5,0,7);g.fill();
        g.fillStyle=`rgba(140,230,190,${fl*0.3})`;
        g.beginPath();g.arc(side?wx+26:wx-26,ly+Math.sin(T*2+wy)*5,12,0,7);g.fill();
      }
    }
  }
  // 崖沿+石碑
  {
    const gy=sy(CLIFF_Y);
    if(gy>-60&&gy<H+120){
      g.fillStyle='#2e2438';g.fillRect(sx(-60),gy,580,160);
      g.fillStyle='#3a2e46';g.fillRect(sx(-60),gy,580,12);
      g.fillStyle='#4a3c56';g.fillRect(sx(360),gy-96,56,96);
      g.fillStyle='#efe0c0';g.font='17px serif';
      g.save();g.translate(sx(388),gy-78);
      g.fillText('黄',-8,0);g.fillText('泉',-8,20);g.fillText('路',-8,40);g.restore();
      // 电梯门(左侧)
      g.fillStyle='#3a3444';g.fillRect(sx(30),gy-150,110,150);
      g.fillStyle='#241e30';g.fillRect(sx(44),gy-136,82,136);
      const gl=0.4+0.3*Math.sin(T*3);
      g.fillStyle=`rgba(150,230,210,${gl})`;g.fillRect(sx(44),gy-136,82,6);
    }
  }
  // 岩刺
  for(const rk of rocks){
    const ry=sy(rk.y);
    if(ry<-80||ry>H+80)continue;
    const rx0=rk.side?SHAFT.x1-rk.len:SHAFT.x0, rx1=rk.side?SHAFT.x1:SHAFT.x0+rk.len;
    g.fillStyle='#38283e';
    g.beginPath();
    if(rk.side){g.moveTo(sx(rx1),ry-26);g.lineTo(sx(rx0),ry+4);g.lineTo(sx(rx1),ry+34);}
    else{g.moveTo(sx(rx0),ry-26);g.lineTo(sx(rx1),ry+4);g.lineTo(sx(rx0),ry+34);}
    g.fill();
    g.strokeStyle='#241a2c';g.lineWidth=3;g.stroke();
  }
  // 气流柱
  for(const d of drafts){
    const y0=sy(d.y0),y1=sy(d.y1);
    if(y1<-60||y0>H+60)continue;
    g.fillStyle='rgba(150,220,230,0.10)';
    g.fillRect(sx(d.x-d.w/2),y0,d.w,y1-y0);
    g.strokeStyle='rgba(180,240,250,0.5)';g.lineWidth=2.5;
    for(let i=0;i<4;i++){
      const lx=sx(d.x-d.w/2+14+i*(d.w-28)/3);
      const off=((T*140+i*60)%(d.y1-d.y0));
      const ly=y1-off;
      if(ly>y0+10&&ly<y1-4){
        g.beginPath();g.moveTo(lx,ly);g.quadraticCurveTo(lx+6,ly-16,lx,ly-30);g.stroke();}
    }
  }
  // 纸钱(下坠区,往上飘)
  if(P.y<FLY&&!P.onG||camY<FLY-H){
    g.fillStyle='rgba(230,220,180,0.6)';
    for(let i=0;i<10;i++){
      const px2=(i*173+Math.sin(T*1.3+i)*50)%W;
      const py2=H-((i*211+T*120)%(H+80))+40;
      g.save();g.translate(px2,py2);g.rotate(T*2+i);
      g.fillRect(-8,-5,16,10);
      g.fillStyle='rgba(180,160,120,0.6)';g.beginPath();g.arc(0,0,3,0,7);g.fill();
      g.fillStyle='rgba(230,220,180,0.6)';
      g.restore();
    }
  }
  // 锁链圈
  for(const r of rings){
    const ry=sy(r.y);
    if(ry<-60||ry>H+60)continue;
    const gx2=gapX(r);
    g.strokeStyle=r.passed?'rgba(120,120,150,0.35)':'#c8c8e0';
    g.lineWidth=6;g.setLineDash([14,10]);
    g.beginPath();g.moveTo(sx(SHAFT.x0),ry);g.lineTo(sx(gx2-64),ry);g.stroke();
    g.beginPath();g.moveTo(sx(gx2+64),ry);g.lineTo(sx(SHAFT.x1),ry);g.stroke();
    g.setLineDash([]);
    if(!r.passed){
      const gl=0.5+0.4*Math.sin(T*6);
      g.strokeStyle=`rgba(180,230,255,${gl})`;g.lineWidth=3;
      g.beginPath();g.arc(sx(gx2),ry,60,0,7);g.stroke();
    }
  }
  // 望乡台
  {
    const ty=sy(TER.y);
    if(ty>-160&&ty<H+160){
      g.fillStyle='#3c3048';g.fillRect(sx(TER.x0),ty,TER.x1-TER.x0,44);
      g.fillStyle='#4a3c56';g.fillRect(sx(TER.x0),ty,TER.x1-TER.x0,10);
      // 接引亭(小亭+引魂灯)
      const gl=0.5+0.3*Math.sin(T*2);
      g.strokeStyle='#4a3c56';g.lineWidth=7;
      g.beginPath();g.moveTo(sx(200),ty);g.lineTo(sx(200),ty-110);
      g.moveTo(sx(290),ty);g.lineTo(sx(290),ty-110);g.stroke();
      g.fillStyle='#352a44';
      g.beginPath();g.moveTo(sx(176),ty-110);g.lineTo(sx(245),ty-146);g.lineTo(sx(314),ty-110);g.fill();
      g.strokeStyle='#4a3c56';g.lineWidth=4;
      g.beginPath();g.moveTo(sx(245),ty-146);g.lineTo(sx(245),ty-120);g.stroke();
      g.fillStyle=`rgba(150,230,210,${gl})`;                 // 引魂灯(幽绿)
      g.beginPath();g.arc(sx(245),ty-104,10,0,7);g.fill();
      g.fillStyle=`rgba(150,230,210,${gl*0.25})`;
      g.beginPath();g.arc(sx(245),ty-104,26,0,7);g.fill();
      // 神龛
      g.fillStyle='#4a3c46';g.fillRect(sx(470),ty-66,54,66);
      g.fillStyle='#352a38';g.beginPath();g.moveTo(sx(458),ty-66);g.lineTo(sx(497),ty-94);g.lineTo(sx(536),ty-66);g.fill();
      g.fillStyle=`rgba(255,200,120,${0.4+0.3*Math.sin(T*3)})`;
      g.beginPath();g.arc(sx(497),ty-36,6,0,7);g.fill();
    }
  }
  // 黑无常(追击)
  if(black){
    const by=sy(black.y);
    if(by>-300){
      g.fillStyle='rgba(16,12,26,0.92)';
      g.beginPath();g.moveTo(0,by-160);
      for(let x=0;x<=W;x+=40)g.lineTo(x,by+Math.sin(x*0.03+T*7)*20);
      g.lineTo(W,-400);g.lineTo(0,-400);g.fill();
      // 白眼+锁链
      g.fillStyle='#e8f0ff';
      g.beginPath();g.arc(sx(P.x)-24,by-40,9,0,7);g.arc(sx(P.x)+24,by-40,7,0,7);g.fill();
      g.fillStyle='#141020';
      g.beginPath();g.arc(sx(P.x)-24,by-37,4,0,7);g.arc(sx(P.x)+24,by-38,3,0,7);g.fill();
      g.strokeStyle='rgba(200,200,220,0.7)';g.lineWidth=4;
      for(const ddx of [-70,50]){
        g.beginPath();g.moveTo(sx(P.x)+ddx,by-10);
        g.quadraticCurveTo(sx(P.x)+ddx+14,by+40,sx(P.x)+ddx-8,by+90+Math.sin(T*5)*14);g.stroke();
      }
    }
  }
  // 魂雾层(接近路面,灰白涌动)
  {
    const fy=sy(FLY);
    if(fy<H+100){
      const grd=g.createLinearGradient(0,fy,0,sy(ROADY));
      grd.addColorStop(0,'rgba(190,196,210,0)');
      grd.addColorStop(1,'rgba(190,196,210,0.4)');
      g.fillStyle=grd;g.fillRect(0,fy,W,sy(ROADY)-fy);
      g.fillStyle='rgba(200,206,220,0.25)';
      for(let i=0;i<5;i++){
        const mx=(i*180+Math.sin(T*0.8+i)*40)%W;
        g.beginPath();g.ellipse(mx,sy(FLY+500+((i*173)%700)),120,30,0,0,7);g.fill();
      }
    }
  }
  // 黄泉路
  {
    const gy=sy(ROADY);
    if(gy<H+80){
      g.fillStyle='#2a2030';g.fillRect(sx(460),gy,ROAD_X1-460,H);
      g.fillStyle='#38283e';g.fillRect(sx(460),gy,ROAD_X1-460,12);
      // 路侧白幡+磷火(彼岸花要过了鬼门关才有)
      for(let x=560;x<ROAD_X1;x+=260){
        const fx2=sx(x);
        if(fx2<-60||fx2>W+60)continue;
        g.strokeStyle='#4a3c56';g.lineWidth=4;
        g.beginPath();g.moveTo(fx2,gy);g.lineTo(fx2,gy-120);g.stroke();
        const wv=Math.sin(T*2.4+x)*10;
        g.fillStyle='rgba(226,228,238,0.85)';
        g.beginPath();g.moveTo(fx2,gy-120);
        g.quadraticCurveTo(fx2+26+wv,gy-102,fx2+18+wv,gy-58);
        g.lineTo(fx2,gy-64);g.fill();
      }
      for(let x=640;x<ROAD_X1;x+=200){
        const fx2=sx(x);
        if(fx2<-40||fx2>W+40)continue;
        const fl=0.35+0.3*Math.sin(T*3+x);
        g.fillStyle=`rgba(140,230,190,${fl})`;
        g.beginPath();g.arc(fx2,gy-40+Math.sin(T*1.7+x)*10,4,0,7);g.fill();
      }
    }
  }
  // 鬼门关
  {
    const gx2=sx(GATE_X), gy=sy(ROADY);
    if(gx2>-400&&gx2<W+400){
      g.fillStyle='#241a28';
      g.fillRect(gx2-30,gy-560,70,560);g.fillRect(gx2+240,gy-560,70,560);
      g.fillRect(gx2-50,gy-600,380,70);
      g.fillStyle='#efe0c0';g.font='34px serif';g.textAlign='center';
      g.fillText('鬼 門 關',gx2+140,gy-552);g.textAlign='left';
      const open=BULL.dead&&HORSE.dead;
      g.fillStyle=open?'#100c18':'#38222e';
      g.save();
      if(open){g.translate(gx2+40,0);g.transform(0.4,0,0,1,0,0);g.translate(-(gx2+40),0);}
      g.fillRect(gx2+40,gy-530,100,530);
      g.restore();
      g.save();
      if(open){g.translate(gx2+240,0);g.transform(0.4,0,0,1,0,0);g.translate(-(gx2+240),0);}
      g.fillRect(gx2+140,gy-530,100,530);
      g.restore();
      if(open){
        const gl=0.4+0.3*Math.sin(T*2);
        g.fillStyle=`rgba(120,220,190,${gl})`;g.fillRect(gx2+60,gy-520,160,520);
      }
      // 门钉
      g.fillStyle='#8a6a3a';
      for(let r2=0;r2<4;r2++)for(let c2=0;c2<2;c2++){
        g.beginPath();g.arc(gx2+70+c2*40,gy-480+r2*110,7,0,7);g.fill();
        g.beginPath();g.arc(gx2+170+c2*40,gy-480+r2*110,7,0,7);g.fill();}
    }
  }
  // 怨魂
  for(const w2 of wisps){
    if(w2.dead)continue;
    const wx=sx(w2.x), wy=sy(w2.y);
    if(wx<-60||wx>W+60)continue;
    g.fillStyle=w2.hit>0?'rgba(255,220,220,0.9)':'rgba(170,190,230,0.75)';
    g.beginPath();g.arc(wx,wy,18,Math.PI,0);
    g.quadraticCurveTo(wx+18,wy+26,wx+10,wy+30);
    g.quadraticCurveTo(wx,wy+18,wx-10,wy+30);
    g.quadraticCurveTo(wx-18,wy+26,wx-18,wy);g.fill();
    g.fillStyle='#222';g.beginPath();g.arc(wx-6,wy-2,3,0,7);g.arc(wx+6,wy-2,3,0,7);g.fill();
  }
  // 牛头
  if(!BULL.dead){
    const bx=sx(BULL.x), by=sy(BULL.y);
    if(bx>-120&&bx<W+120){
      const hk=BULL.hit>0, pre=BULL.st==='pre';
      g.save();g.translate(bx,by);
      if(pre)g.translate((Math.random()-0.5)*4,0);
      g.fillStyle=hk?'#ffd8d0':pre?'#a04838':'#7a4838';
      g.fillRect(-34,-96,68,96);
      g.beginPath();g.arc(0,-108,34,0,7);g.fill();          // 牛头
      g.fillStyle='#e8dcc8';
      g.beginPath();g.moveTo(-30,-120);g.quadraticCurveTo(-58,-140,-50,-158);g.lineTo(-38,-138);g.fill();
      g.beginPath();g.moveTo(30,-120);g.quadraticCurveTo(58,-140,50,-158);g.lineTo(38,-138);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(-12,-110,7,0,7);g.arc(12,-110,7,0,7);g.fill();
      g.fillStyle=pre?'#d83030':'#222';
      g.beginPath();g.arc(-12+BULL.dir*2,-110,3.4,0,7);g.arc(12+BULL.dir*2,-110,3.4,0,7);g.fill();
      g.fillStyle='#5a4230';g.fillRect(BULL.dir*30-8,-70,16,70); // 大锤柄
      g.fillStyle='#6a6a78';g.fillRect(BULL.dir*30-24,-100,48,36);
      g.restore();
      g.fillStyle='#2a2436';g.fillRect(bx-40,by-176,80,8);
      g.fillStyle='#d85a4a';g.fillRect(bx-40,by-176,80*BULL.hp/20,8);
    }
  }
  // 马面
  if(!HORSE.dead){
    const hx=sx(HORSE.x), hy=sy(HORSE.y);
    if(hx>-160&&hx<W+160){
      const hk=HORSE.hit>0, aim=HORSE.st==='aim', stab=HORSE.st==='stab';
      g.save();g.translate(hx,hy);
      g.fillStyle=hk?'#ffd8d0':'#a8b0c0';
      g.fillRect(-26,-100,52,100);
      // 马脸(长)
      g.beginPath();g.ellipse(HORSE.dir*10,-118,20,30,HORSE.dir*0.3,0,7);g.fill();
      g.fillStyle='#8a92a4';g.beginPath();g.ellipse(HORSE.dir*20,-134,8,14,HORSE.dir*0.4,0,7);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(HORSE.dir*6,-126,6,0,7);g.fill();
      g.fillStyle=aim?'#d83030':'#222';g.beginPath();g.arc(HORSE.dir*7,-126,3,0,7);g.fill();
      // 长枪
      g.strokeStyle='#5a4230';g.lineWidth=7;
      const ext=stab?180:aim?30:60;
      g.beginPath();g.moveTo(-HORSE.dir*30,-60);g.lineTo(HORSE.dir*ext,-60);g.stroke();
      g.fillStyle='#c8ccd8';
      g.beginPath();g.moveTo(HORSE.dir*ext,-68);g.lineTo(HORSE.dir*(ext+34),-60);g.lineTo(HORSE.dir*ext,-52);g.fill();
      g.restore();
      // 预警线
      if(aim){
        g.strokeStyle=`rgba(255,80,80,${0.3+0.3*Math.sin(T*16)})`;g.lineWidth=4;
        g.beginPath();g.moveTo(hx+HORSE.dir*40,hy-60);g.lineTo(hx+HORSE.dir*230,hy-60);g.stroke();
      }
      g.fillStyle='#2a2436';g.fillRect(hx-40,hy-176,80,8);
      g.fillStyle='#d85a4a';g.fillRect(hx-40,hy-176,80*HORSE.hp/20,8);
    }
  }
  // 主角
  {
    const px=sx(P.x), py=sy(P.y);
    g.save();g.translate(px,py);
    if(P.inv>0&&Math.sin(T*30)>0)g.globalAlpha=0.4;
    if(!P.onG)g.rotate(Math.min(0.3,P.vy*0.00012)*P.dir);
    g.fillStyle='#4a5a78';g.fillRect(-11,-42,22,28);
    g.fillStyle='#f0c8a0';g.beginPath();g.arc(0,-60,18,0,7);g.fill();
    g.fillStyle='#3a3444';g.beginPath();g.arc(0,-67,17,Math.PI,0);g.fill();
    g.fillStyle='#222';g.beginPath();g.arc(P.dir*7,-60,2.4,0,7);g.fill();
    if(P.atkT>0.1){g.strokeStyle='#e8e8f0';g.lineWidth=5;
      g.beginPath();g.arc(P.dir*10,-40,36,-1.2*P.dir,0.6*P.dir,P.dir<0);g.stroke();}
    g.strokeStyle='#3a4258';g.lineWidth=5;
    if(!P.onG){
      g.beginPath();g.moveTo(-5,-14);g.lineTo(-11,-2+Math.sin(T*9)*4);g.moveTo(5,-14);g.lineTo(11,-2-Math.sin(T*9)*4);g.stroke();
    } else {
      g.beginPath();g.moveTo(-5,-14);g.lineTo(-7,0);g.moveTo(5,-14);g.lineTo(7,0);g.stroke();
    }
    g.restore();
    // 俯冲特效
    if(!P.onG&&(keys.KeyS||keys.ArrowDown)){
      g.strokeStyle='rgba(200,190,230,0.5)';g.lineWidth=3;
      for(const ddx of [-16,0,16]){
        g.beginPath();g.moveTo(px+ddx,py-90);g.lineTo(px+ddx,py-60);g.stroke();}
    }
  }
  for(const p of parts){g.globalAlpha=1-p.life/p.max;g.fillStyle=p.col;
    g.fillRect(sx(p.x)-3,sy(p.y)-3,6,6);}
  g.globalAlpha=1;

  // HUD
  for(let i=0;i<3;i++){g.fillStyle=i<P.hp?'#e85a5a':'#443a4c';
    g.beginPath();const hx=34+i*40,hy=36;
    g.arc(hx-7,hy-4,9,0,7);g.arc(hx+7,hy-4,9,0,7);
    g.moveTo(hx-15,hy);g.lineTo(hx,hy+16);g.lineTo(hx+15,hy);g.fill();}
  g.fillStyle='#c8b8e8';g.font='24px monospace';
  g.fillText('深 '+(P.y/100|0)+'m',34,86);
  g.fillStyle='#ffd76a';g.beginPath();g.arc(44,118,9,0,7);g.fill();
  g.fillStyle='#fff';g.font='20px monospace';g.fillText('×'+coins,60,126);
  if(GOD){g.fillStyle='rgba(150,230,180,0.9)';g.font='20px monospace';g.fillText('无敌 ON(按G关)',W-220,40);}
  if(msgT>0){g.font='26px sans-serif';const w2=g.measureText(msg).width;
    g.fillStyle='rgba(18,12,26,0.78)';g.fillRect(W/2-w2/2-20,150,w2+40,48);
    g.fillStyle='#e8d8ff';g.textAlign='center';g.fillText(msg,W/2,183);g.textAlign='left';}
  if(P.dead)ov('魂飞魄散…','按跳跃/攻击键从检查点再来');
  if(P.win)ov('过鬼门关!','黄泉路走完 · 接第8关「冥界」 · 按键重玩');
  g.restore();
}
function ov(t1,t2){
  g.fillStyle='rgba(8,6,16,0.75)';g.fillRect(0,0,W,H);
  g.fillStyle='#e8d8ff';g.font='52px sans-serif';g.textAlign='center';
  g.fillText(t1,W/2,H/2-30);
  g.fillStyle='#cfc6e6';g.font='24px sans-serif';g.fillText(t2,W/2,H/2+30);g.textAlign='left';
}
let last=0;
function loop(ts){
  let dt=Math.min(0.033,(ts-last)/1000||0.016);last=ts;
  if(slow>0){slow-=dt;dt*=0.4;}
  step(dt);draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
