<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>巨树丛林 Demo · 微缩探险</title>
<style>
  html,body{margin:0;padding:0;background:#141b12;height:100%;overflow:hidden;touch-action:none}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%}
  canvas{background:#1c2618;max-height:100vh;max-width:100vw}
  #tip{position:fixed;left:10px;top:8px;color:#9b9;font:12px/1.6 monospace;pointer-events:none;white-space:pre}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="720" height="1280"></canvas></div>
<div id="tip">A/D 移动 · W/空格 跳(二段) · 碰藤=荡秋千(A/D加力,跳=甩出) · 碰蒲公英=漂浮 · 红蘑菇=大弹跳
路线:丛林地面→爬树A(横风)→树冠横越→钻树洞下降→中层丛林→爬树C(蜂潮)→树顶还原果
吃还原果=变回原大,巨树原来只是小树苗…眼前就是古井,跳井接第6关!G 无敌开关(默认开)</div>
<script>
'use strict';
const cv = document.getElementById('cv'), g = cv.getContext('2d');
const W = 720, H = 1280;
const WORLD_W = 6400, TOPY = 9400;

// ── 变奏带 ──
const WINDS=[{y0:2600,y1:3800,x0:1450,x1:2050,dir:1},{y0:6800,y1:7900,x0:5350,x1:6150,dir:-1}];
const SURGES=[{y0:4200,y1:5600,x0:5350,fired:0}];
const HOLLOWR={x0:3480,x1:3820,y0:2600,y1:5200};   // 树B内部(下降段,黑暗)
const inHollow=(x,y)=>x>HOLLOWR.x0&&x<HOLLOWR.x1&&y>HOLLOWR.y0&&y<HOLLOWR.y1;

// ── 巨树 ──
const trees=[
  {cx:1750,w:320,y0:0,y1:5650},
  {cx:3650,w:340,y0:2450,y1:5850},
  {cx:5750,w:320,y0:2400,y1:9600},
];

// ── 世界搭建 ──
const plats=[],vines=[],seeds=[],bees=[],berries=[],cps=[];
{
  const rnd=s=>((Math.sin(s*127.1)*43758.5)%1+1)%1;
  const leaf=(x,y,w)=>plats.push({x,y,w,type:'leaf'});
  const branch=(x,y,w)=>plats.push({x,y,w,type:'branch'});
  const shroom=(x,y)=>plats.push({x,y,w:120,type:'shroom'});
  const rest=(x,y)=>{branch(x,y,340);cps.push({x,y,on:0});
    for(const d of [-110,0,110])berries.push({x:x+d,y:y+70,got:0});};

  // ① 丛林地面探险
  for(let x=100;x<1620;x+=210)branch(x,0,230);
  shroom(760,0);
  bees.push({x:520,y:210,ph:1,r:90},{x:1240,y:250,ph:3,r:110});
  for(const bx of [420,900,1380])berries.push({x:bx,y:66,got:0});
  vines.push({ax:1140,ay:470,len:330});

  // ② 爬树A(横风带)
  {
    let y=190, cx2=1750, i=0;
    while(y<5150){
      const step=135+rnd(i*2.3)*70;
      const dxMax=Math.max(120,300-step);
      let nx=cx2+(rnd(i*7.3)-0.5)*2*dxMax;
      nx=Math.max(1560,Math.min(1940,nx));
      const r=rnd(i*3.7);
      if(r<0.14)shroom(nx,y);
      else if(r<0.3&&y>600){vines.push({ax:nx,ay:y+400,len:300});leaf(Math.max(1560,Math.min(1940,nx+(rnd(i)<0.5?-1:1)*200)),y,150);}
      else leaf(nx,y,150+rnd(i*5)*70);
      cx2=nx; y+=step; i++;
    }
    rest(1750,1750); rest(1750,3450);
  }

  // ③ 树冠横越
  {
    let x=1990, i=0, y=5200;
    while(x<3400){
      const r=rnd(i*5.1);
      const wob=(rnd(i*3.3)-0.5)*90;
      if(r<0.3&&x>2150&&x<3200){
        vines.push({ax:x+180,ay:y+430,len:340});
        x+=330;
        leaf(x,y+wob*0.4,150);
      } else {
        leaf(x,y+wob,150+rnd(i*7)*70);
      }
      x+=210+rnd(i*2.7)*90;
      i++;
    }
    rest(2700,5200);
    bees.push({x:2380,y:5400,ph:0,r:120},{x:3080,y:5430,ph:2,r:140});
  }

  // ④ 树B内部下降(黑暗)
  {
    branch(3560,5160,180);
    let y=4900, i=0;
    while(y>2680){
      const nx=3560+(i%2)*180+(rnd(i*9)-0.5)*40;
      leaf(nx,y,140);
      if(i%3===2)berries.push({x:nx,y:y+66,got:0});
      y-=270+rnd(i*4.1)*60;
      i++;
    }
    rest(3650,2600);
  }

  // ⑤ 中层丛林(缺口+种子)
  {
    let x=3900;
    const gaps=[4450,4950];
    while(x<5360){
      const nearGap=gaps.some(gx=>Math.abs(x-gx)<130);
      if(!nearGap)branch(x,2600,220);
      x+=210;
    }
    for(const gx of gaps)seeds.push({x0:gx,y0:2380,t:gx%6,used:0,cd:0});
    shroom(5080,2600);
    bees.push({x:4700,y:2830,ph:1.4,r:120});
    rest(5180,2600);
  }

  // ⑥ 爬树C(蜂潮+横风)
  {
    let y=2780, cx2=5750, i=0;
    while(y<9020){
      const step=135+rnd(i*2.9)*70;
      const dxMax=Math.max(120,300-step);
      let nx=cx2+(rnd(i*6.7)-0.5)*2*dxMax;
      nx=Math.max(5560,Math.min(5940,nx));
      const r=rnd(i*4.3);
      if(r<0.13)shroom(nx,y);
      else if(r<0.3&&y>3200){vines.push({ax:nx,ay:y+400,len:300});leaf(Math.max(5560,Math.min(5940,nx+(rnd(i)<0.5?-1:1)*200)),y,150);}
      else if(r<0.42&&y>5800){seeds.push({x0:nx,y0:y,t:rnd(i)*6,used:0,cd:0});leaf(Math.max(5560,Math.min(5940,nx+(rnd(i)<0.5?-1:1)*190)),y+80,140);}
      else leaf(nx,y,150+rnd(i*5)*60);
      if(y>5900&&rnd(i*11)<0.3)bees.push({x:5460+rnd(i*13)*560,y:y+90,ph:rnd(i)*6,r:100});
      cx2=nx; y+=step; i++;
    }
    rest(5750,4000); rest(5750,5900); rest(5750,7950);
  }

  // ⑦ 冲顶+还原果
  leaf(5750,9120,170); leaf(5600,9280,150); branch(5750,9400,220);
}
const fruit={x:5750,y:9480,got:0};   // 还原果(树顶)

// ── 玩家/模式 ──
// MODE: micro(微缩世界) → zoom(还原演出) → normal(正常尺寸,走向井口)
let MODE='micro', zoomT=0;
const P={x:120,y:0,vx:0,vy:0,dir:1,jumps:0,onG:1,hp:3,inv:0,
  mode:'walk',vineI:-1,th:0,om:0,vineCd:0,seedI:-1,fx:0,dead:0,win:0};
let camX=0,camY=0,cpIdx=-1,coins=0,GOD=1,shake=0,T=0;
let msg='',msgT=0,surge=null,hollowMsg=0,windMsg=0;
// 正常尺寸小场景
const N={x:150,y:1000,vy:0,onG:1,dir:1,inWell:0};
function msgQ(t){msg=t;msgT=2.4;}
const keys={};
onkeydown=e=>{keys[e.code]=1;
  if(['Space','KeyW'].includes(e.code)){e.preventDefault();jump();}
  if(e.code==='KeyG')GOD=!GOD;};
onkeyup=e=>keys[e.code]=0;
let touchL={on:0,x:0};
cv.addEventListener('touchstart',ev=>{const r=cv.getBoundingClientRect();
  for(const t of ev.changedTouches){const x=(t.clientX-r.left)/r.width*W,y=(t.clientY-r.top)/r.height*H;
    if(x<W/2&&y>H*0.5){touchL={on:1,x,id:t.identifier};} else jump();}
  if(P.dead||P.win)restart();ev.preventDefault();},{passive:false});
cv.addEventListener('touchmove',ev=>{const r=cv.getBoundingClientRect();
  for(const t of ev.changedTouches){if(touchL.on&&t.identifier===touchL.id)touchL.x=(t.clientX-r.left)/r.width*W;}
  ev.preventDefault();},{passive:false});
cv.addEventListener('touchend',ev=>{for(const t of ev.changedTouches)if(t.identifier===touchL.id)touchL.on=0;
  ev.preventDefault();},{passive:false});

function jump(){
  if(P.dead||P.win){restart();return;}
  if(MODE==='normal'){
    if(N.onG&&!N.inWell){N.vy=560;N.onG=0;}
    return;
  }
  if(MODE!=='micro')return;
  if(P.mode==='swing'){
    const v=vines[P.vineI];
    P.vx=Math.cos(P.th)*P.om*v.len; P.vy=Math.sin(P.th)*P.om*v.len+240;
    P.mode='walk';P.vineI=-1;P.vineCd=0.5;P.jumps=1;return;
  }
  if(P.mode==='float'){
    P.vy=430;P.vx=0;P.mode='walk';
    if(P.seedI>=0){seeds[P.seedI].used=1;seeds[P.seedI].cd=6;burst(P.x,P.y+30);}
    P.seedI=-1;P.jumps=1;return;
  }
  if(P.jumps<2){P.vy=620;P.jumps++;P.onG=0;}
}
function restart(){
  if(!P.dead&&!P.win)return;
  P.dead=0;P.win=0;P.hp=3;P.vx=0;P.vy=0;P.mode='walk';P.vineI=-1;P.seedI=-1;
  if(MODE!=='micro'){MODE='normal';N.x=150;N.y=1000;N.vy=0;N.inWell=0;return;}
  if(cpIdx>=0){P.x=cps[cpIdx].x;P.y=cps[cpIdx].y;}else{P.x=120;P.y=0;}
}
function hurt(n){ if(GOD){shake=4;return;} if(P.inv>0||P.dead)return;
  P.hp-=n;P.inv=1.4;shake=9; if(P.hp<=0){P.hp=0;P.dead=1;} }
const parts=[];
function burst(x,y){for(let i=0;i<10;i++){const a=Math.random()*6.283;
  parts.push({x,y,vx:Math.cos(a)*120,vy:Math.sin(a)*120+60,life:0,max:0.6,col:'#f0f4ff'});}}
function spark(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*6.283;
  parts.push({x,y,vx:Math.cos(a)*140,vy:Math.sin(a)*140,life:0,max:0.5,col});}}

function step(dt){
  T+=dt;
  if(msgT>0)msgT-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*30);
  if(MODE==='zoom'){zoomT+=dt;if(zoomT>2.6){MODE='normal';msgQ('变回原大了…前面就是那口古井');}return;}
  if(MODE==='normal'){
    const mv=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0)
      ||(touchL.on?Math.sign(touchL.x-(W/4)):0);
    if(mv)N.dir=mv;
    if(!N.inWell){
      N.x=Math.max(60,Math.min(660,N.x+mv*250*dt));
      N.vy-=1500*dt;N.y+=N.vy*dt;
      if(N.y<=1000&&N.vy<=0){
        // 井口范围内落下=掉进井
        if(Math.abs(N.x-560)<40){N.inWell=1;msgQ('入井——!');}
        else {N.y=1000;N.vy=0;N.onG=1;}
      }
      if(Math.abs(N.x-560)<70&&N.onG&&msgT<=0)msgQ('跳进井里!(W/空格)');
    } else {
      N.y+=N.vy*dt;N.vy-=1500*dt;
      if(N.y<400)P.win=1;
    }
    return;
  }
  if(P.dead||P.win)return;
  if(P.inv>0)P.inv-=dt;
  if(P.vineCd>0)P.vineCd-=dt;

  const mv=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0)
    ||(touchL.on?Math.sign(touchL.x-(W/4)):0);
  if(mv)P.dir=mv;

  if(P.mode==='swing'){
    const v=vines[P.vineI];
    P.om+=(-1200/v.len)*Math.sin(P.th)*dt + mv*1.1*dt;
    P.om*=0.995;
    P.th+=P.om*dt;
    P.x=v.ax+Math.sin(P.th)*v.len;
    P.y=v.ay-Math.cos(P.th)*v.len;
  } else if(P.mode==='float'){
    const sd=seeds[P.seedI];
    sd.t+=dt;
    P.x=sd.x0+Math.sin(sd.t)*44+P.fx;
    P.fx+=mv*80*dt;
    P.y+=48*dt; sd.yr=(sd.yr||0)+48*dt;
    if(sd.yr>560){sd.used=1;sd.cd=6;burst(P.x,P.y+30);P.mode='walk';P.seedI=-1;P.vy=0;}
  } else {
    P.vx=mv*250;
    P.x+=P.vx*dt;
    P.vy-=1500*dt;
    const py0=P.y;
    P.y+=P.vy*dt;
    P.x=Math.max(30,Math.min(WORLD_W-30,P.x));
    if(P.vy<=0){
      for(const p of plats){
        if(Math.abs(P.x-p.x)<p.w/2+10&&py0>=p.y-4&&P.y<=p.y){
          P.y=p.y;P.vy=0;P.jumps=0;P.onG=1;
          if(p.type==='shroom'){P.vy=880;P.jumps=1;spark(p.x,p.y,'#ff9a8a',8);}
          break;
        }
      }
    }
    if(P.vy!==0)P.onG=0;
  }
  // 摔落保护
  const cpY=cpIdx>=0?cps[cpIdx].y:0;
  if(P.y<cpY-950&&P.mode==='walk'){
    P.x=cpIdx>=0?cps[cpIdx].x:120;P.y=cpY;P.vy=0;
    msgQ('摔下去了…回到萤火处');shake=6;
  }
  // 抓藤
  if(P.mode==='walk'&&P.vineCd<=0){
    for(let i=0;i<vines.length;i++){const v=vines[i];
      const tx=v.ax,ty=v.ay-v.len;
      if(Math.hypot(P.x-tx,P.y+30-ty)<52){
        P.mode='swing';P.vineI=i;
        P.th=Math.atan2(P.x-v.ax,v.ay-(P.y+30));
        P.om=P.vx/v.len*0.8;
        break;}}
  }
  // 抓种子
  if(P.mode==='walk'){
    for(let i=0;i<seeds.length;i++){const sd=seeds[i];
      if(sd.used)continue;
      const sx2=sd.x0+Math.sin(sd.t)*44, sy2=sd.y0+(sd.yr||0);
      if(Math.hypot(P.x-sx2,P.y+40-sy2)<48){
        P.mode='float';P.seedI=i;P.fx=0;P.vy=0;break;}}
  }
  for(const sd of seeds){
    sd.t+=dt*0.6;
    if(sd.used){sd.cd-=dt;if(sd.cd<=0){sd.used=0;sd.yr=0;}}
  }
  // 横风
  let inWind=false;
  for(const wz of WINDS){
    if(P.y>wz.y0&&P.y<wz.y1&&P.x>wz.x0&&P.x<wz.x1){
      inWind=true;
      if(P.mode==='walk')P.x+=wz.dir*95*dt;
      if(P.mode==='float')P.x+=wz.dir*150*dt;
      if(!windMsg){windMsg=1;msgQ(wz.dir>0?'横风!往右吹→':'←横风!往左吹');}
    }
  }
  if(!inWind)windMsg=0;
  // 蜂潮
  for(const sg of SURGES){
    if(!sg.fired&&P.y>sg.y0&&P.x>sg.x0){sg.fired=1;surge={y:P.y-620,until:sg.y1,tick:0};msgQ('蜂潮来了!快往上爬!!');}
  }
  if(surge){
    surge.y+=100*dt;
    surge.tick-=dt;
    if(P.y<surge.y+40&&surge.tick<=0){surge.tick=0.8;hurt(1);}
    if(P.y>surge.until||surge.y>surge.until){surge=null;msgQ('甩掉蜂潮了…');}
  }
  // 树洞
  if(inHollow(P.x,P.y)){
    if(!hollowMsg){hollowMsg=1;msgQ('树洞里黑漆漆…往下跳');}
    if(P.mode==='walk')P.x=Math.max(HOLLOWR.x0+18,Math.min(HOLLOWR.x1-18,P.x));
  } else hollowMsg=0;
  // 浆果
  for(const br of berries){
    if(!br.got&&Math.hypot(P.x-br.x,P.y+40-br.y)<34){br.got=1;coins++;spark(br.x,br.y,'#ff9a8a',8);}
  }
  // 蜂
  for(const b of bees){
    b.ph+=dt;
    const bx=b.x+Math.sin(b.ph*0.9)*b.r, by=b.y+Math.sin(b.ph*2.3)*30;
    if(Math.hypot(P.x-bx,P.y+40-by)<40){hurt(1);P.vx=-Math.sign(bx-P.x)*200;}
  }
  // 检查点
  for(let i=0;i<cps.length;i++){const c=cps[i];
    if(!c.on&&Math.abs(P.x-c.x)<80&&Math.abs(P.y-c.y)<80){c.on=1;cpIdx=i;spark(c.x,c.y+40,'#c8ffb0',12);msgQ('检查点 ✓');}}
  // 还原果
  if(!fruit.got&&Math.hypot(P.x-fruit.x,P.y+40-fruit.y)<44){
    fruit.got=1;MODE='zoom';zoomT=0;msgQ('还原果!身体在变大——');
  }
  // 相机
  camX+=((P.x-W/2)-camX)*Math.min(1,dt*5);
  camX=Math.max(0,Math.min(WORLD_W-W,camX));
  camY+=(Math.max(0,P.y-H*0.42)-camY)*Math.min(1,dt*5);

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.life+=dt;
    if(p.life>p.max){parts.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy-=300*dt;}
}

const sx=wx=>wx-camX;
const sy=wy=>(H-140)-(wy-camY);

function drawMicro(){
  // 背景
  const prog=Math.min(1,camY/(TOPY-H));
  const mix=(a,b,k)=>a+(b-a)*k;
  const sky=g.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,`rgb(${mix(26,120,prog)|0},${mix(38,160,prog)|0},${mix(24,110,prog)|0})`);
  sky.addColorStop(1,`rgb(${mix(16,60,prog)|0},${mix(24,110,prog)|0},${mix(14,70,prog)|0})`);
  g.fillStyle=sky;g.fillRect(-W,-H,W*3,H*3);
  g.fillStyle=`rgba(255,240,180,${0.10+prog*0.25})`;
  g.beginPath();g.arc(W*0.5,-60,320,0,7);g.fill();
  g.fillStyle=`rgba(240,255,200,${0.05+prog*0.05})`;
  for(let i=0;i<3;i++){
    const lx=((i*260+80)-camX*0.15-camY*0.06)%(W+200);
    g.beginPath();g.moveTo(lx,0);g.lineTo(lx+90,0);g.lineTo(lx-60,H);g.lineTo(lx-150,H);g.fill();
  }
  g.fillStyle='rgba(30,52,30,0.85)';
  for(let i=0;i<7;i++){
    const bx=((i*520-camX*0.3)%(W+300)+(W+300))%(W+300)-150;
    const byy=H-((i*1900-camY*0.3)%(H*2.2))-160;
    g.save();g.translate(bx,byy);g.rotate(i%2?-0.3:0.3);
    g.beginPath();g.moveTo(0,0);g.quadraticCurveTo(i%2?-140:140,-180,0,-420);
    g.quadraticCurveTo(i%2?60:-60,-180,0,0);g.fill();g.restore();
  }
  // 巨树干
  for(const tr of trees){
    const x0=sx(tr.cx-tr.w/2), x1=sx(tr.cx+tr.w/2);
    if(x1<-60||x0>W+60)continue;
    const yT=sy(tr.y1), yB=sy(tr.y0);
    g.fillStyle='#3e2e20';
    g.fillRect(x0,Math.max(-40,yT),tr.w,Math.min(H+40,yB)-Math.max(-40,yT)+40);
    g.strokeStyle='rgba(30,22,14,0.8)';g.lineWidth=7;
    for(let wy=Math.floor(tr.y0/300)*300;wy<tr.y1;wy+=300){
      const ly=sy(wy);
      if(ly<-40||ly>H+40)continue;
      g.beginPath();g.moveTo(x0+14,ly);
      g.quadraticCurveTo((x0+x1)/2,ly+40,x1-14,ly-14);g.stroke();
    }
    g.fillStyle='rgba(70,90,40,0.55)';
    for(let wy=Math.floor(tr.y0/520)*520+140;wy<tr.y1;wy+=520){
      const my=sy(wy);
      if(my<-40||my>H+40)continue;
      g.beginPath();g.ellipse((x0+x1)/2+((wy/520)%2?-60:50),my,34,16,0.4,0,7);g.fill();
    }
    const ct=sy(tr.y1);
    if(ct>-200&&ct<H+200){
      g.fillStyle='rgba(60,96,44,0.95)';
      for(const [dx2,r2] of [[-120,110],[0,150],[120,110]]){
        g.beginPath();g.arc(sx(tr.cx)+dx2,ct-40,r2,0,7);g.fill();}
    }
  }
  // 树B洞内
  {
    const x0=sx(HOLLOWR.x0),x1=sx(HOLLOWR.x1),yT=sy(HOLLOWR.y1),yB=sy(HOLLOWR.y0);
    if(!(x1<0||x0>W||yB<0||yT>H)){
      g.fillStyle='#221812';
      g.fillRect(Math.max(0,x0+14),Math.max(-40,yT),Math.min(W,x1-14)-Math.max(0,x0+14),Math.min(H+40,yB)-Math.max(-40,yT));
      g.fillStyle='#3a2c1c';
      g.beginPath();g.ellipse((x0+x1)/2,yT,170,24,0,0,7);g.fill();
      g.beginPath();g.ellipse((x0+x1)/2,yB,170,24,0,0,7);g.fill();
    }
  }
  // 藤蔓
  for(let i=0;i<vines.length;i++){const v=vines[i];
    const ax=sx(v.ax), ay=sy(v.ay);
    if(ax<-450||ax>W+450||ay<-500||ay>H+800)continue;
    let th=Math.sin(T*1.2+i)*0.14;
    if(P.mode==='swing'&&P.vineI===i)th=P.th;
    const tx=ax+Math.sin(th)*v.len, ty=ay+Math.cos(th)*v.len;
    g.strokeStyle='#5a7a3a';g.lineWidth=7;
    g.beginPath();g.moveTo(ax,ay);
    g.quadraticCurveTo(ax+Math.sin(th)*v.len*0.5,ay+Math.cos(th)*v.len*0.55,tx,ty);g.stroke();
    g.fillStyle='#6a9a48';
    g.beginPath();g.ellipse(tx,ty+8,12,20,Math.sin(th)*0.5,0,7);g.fill();
  }
  // 平台
  for(const p of plats){
    const px=sx(p.x), py=sy(p.y);
    if(px<-p.w||px>W+p.w||py<-80||py>H+120)continue;
    if(p.type==='leaf'){
      const dip=(P.onG&&Math.abs(P.x-p.x)<p.w/2&&Math.abs(P.y-p.y)<6)?5:0;
      g.fillStyle='#4e7a34';
      g.beginPath();g.ellipse(px,py+8+dip,p.w/2+12,16,0,0,7);g.fill();
      g.fillStyle='#5e8e3e';
      g.beginPath();g.ellipse(px,py+4+dip,p.w/2+8,12,0,0,7);g.fill();
      g.strokeStyle='#3e6228';g.lineWidth=3;
      g.beginPath();g.moveTo(px-p.w/2,py+6+dip);g.lineTo(px+p.w/2,py+2+dip);g.stroke();
    } else if(p.type==='branch'){
      g.fillStyle='#4e3a26';g.fillRect(px-p.w/2,py,p.w,20);
      g.fillStyle='#5e4630';g.fillRect(px-p.w/2,py,p.w,7);
      g.strokeStyle='#3a2a1a';g.lineWidth=3;
      g.beginPath();g.moveTo(px-p.w/2+8,py+14);g.lineTo(px+p.w/2-8,py+14);g.stroke();
    } else {
      g.fillStyle='#e8e2d0';g.fillRect(px-12,py+8,24,26);
      g.fillStyle='#c85a4a';
      g.beginPath();g.ellipse(px,py+8,p.w/2,26,0,Math.PI,0);g.fill();
      g.fillStyle='#f0e8d8';
      for(const [dx2,dy2] of [[-24,-8],[6,-14],[24,-4]]){g.beginPath();g.arc(px+dx2,py+dy2,6,0,7);g.fill();}
    }
  }
  // 种子
  for(const sd of seeds){
    if(sd.used)continue;
    const sxx=sx(sd.x0+Math.sin(sd.t)*44), syy=sy(sd.y0+(sd.yr||0));
    if(sxx<-60||sxx>W+60||syy<-60||syy>H+60)continue;
    g.strokeStyle='rgba(240,244,255,0.9)';g.lineWidth=2.5;
    for(let a=0;a<7;a++){const aa=a*0.9+sd.t*0.3;
      g.beginPath();g.moveTo(sxx,syy);g.lineTo(sxx+Math.cos(aa)*22,syy+Math.sin(aa)*22);g.stroke();}
    g.fillStyle='#f0f4ff';g.beginPath();g.arc(sxx,syy,7,0,7);g.fill();
  }
  // 蜂
  for(const b of bees){
    const bx=sx(b.x+Math.sin(b.ph*0.9)*b.r), byy=sy(b.y+Math.sin(b.ph*2.3)*30);
    if(bx<-60||bx>W+60||byy<-60||byy>H+60)continue;
    g.fillStyle='#e8c04a';g.beginPath();g.ellipse(bx,byy,16,12,0,0,7);g.fill();
    g.fillStyle='#4a3a20';g.fillRect(bx-8,byy-12,5,24);g.fillRect(bx+3,byy-12,5,24);
    g.fillStyle='rgba(240,244,255,0.7)';
    g.beginPath();g.ellipse(bx-4,byy-16,10,6,-0.5+Math.sin(T*40)*0.3,0,7);
    g.ellipse(bx+6,byy-16,10,6,0.5-Math.sin(T*40)*0.3,0,7);g.fill();
    g.fillStyle='#222';g.beginPath();g.arc(bx+10,byy-2,2.6,0,7);g.fill();
  }
  // 浆果
  for(const br of berries){
    if(br.got)continue;
    const bx=sx(br.x), by=sy(br.y);
    if(bx<-40||bx>W+40||by<-40||by>H+40)continue;
    const gl=0.7+0.3*Math.sin(T*4+br.x);
    g.fillStyle=`rgba(240,110,90,${gl})`;g.beginPath();g.arc(bx,by,10,0,7);g.fill();
    g.fillStyle='rgba(255,200,180,0.8)';g.beginPath();g.arc(bx-3,by-3,3,0,7);g.fill();
    g.strokeStyle='#4e7a34';g.lineWidth=3;g.beginPath();g.moveTo(bx,by-10);g.lineTo(bx+4,by-20);g.stroke();
  }
  // 检查点
  for(let i=0;i<cps.length;i++){const c=cps[i];
    const cx3=sx(c.x), cy2=sy(c.y);
    if(cx3<-60||cx3>W+60||cy2<-60||cy2>H+60)continue;
    const gl=c.on?0.9:0.45+0.3*Math.sin(T*4+i);
    g.fillStyle=`rgba(200,255,150,${gl})`;
    g.beginPath();g.arc(cx3+Math.sin(T*2+i)*14,cy2-60+Math.sin(T*3.1+i)*8,6,0,7);g.fill();
    g.fillStyle=`rgba(200,255,150,${gl*0.25})`;
    g.beginPath();g.arc(cx3+Math.sin(T*2+i)*14,cy2-60+Math.sin(T*3.1+i)*8,16,0,7);g.fill();
  }
  // 还原果(树顶,金光)
  if(!fruit.got){
    const fx2=sx(fruit.x), fy=sy(fruit.y);
    if(fy>-100){
      const gl=0.6+0.4*Math.sin(T*3);
      g.fillStyle=`rgba(255,200,90,${gl*0.3})`;g.beginPath();g.arc(fx2,fy,40,0,7);g.fill();
      g.fillStyle='#f0a04a';g.beginPath();g.arc(fx2,fy,17,0,7);g.fill();
      g.fillStyle='#ffd9a0';g.beginPath();g.arc(fx2-5,fy-5,6,0,7);g.fill();
      g.strokeStyle='#4e7a34';g.lineWidth=3;g.beginPath();g.moveTo(fx2,fy-16);g.lineTo(fx2+5,fy-28);g.stroke();
    }
  }
  // 洞内黑暗
  if(inHollow(P.x,P.y)){
    const grd=g.createRadialGradient(sx(P.x),sy(P.y)-40,80,sx(P.x),sy(P.y)-40,420);
    grd.addColorStop(0,'rgba(8,10,6,0)');grd.addColorStop(1,'rgba(8,10,6,0.72)');
    g.fillStyle=grd;g.fillRect(-W,-H,W*3,H*3);
  }
  // 横风叶
  for(const wz of WINDS){
    if(!(P.x>wz.x0-300&&P.x<wz.x1+300))continue;
    const yT=sy(wz.y1), yB=sy(wz.y0);
    if(yB<-60||yT>H+60)continue;
    g.fillStyle='rgba(150,200,110,0.5)';
    for(let i=0;i<10;i++){
      const lx=((i*140+T*260*wz.dir)%(W+160)+(W+160))%(W+160)-80;
      const band=Math.max(60,Math.min(yB,H)-Math.max(yT,0));
      const ly=Math.max(yT,0)+((i*97)%band);
      g.save();g.translate(lx,ly);g.rotate(T*3+i);
      g.beginPath();g.ellipse(0,0,10,4,0,0,7);g.fill();g.restore();
    }
  }
  // 蜂潮
  if(surge){
    const syg=sy(surge.y);
    if(syg>-80){
      g.fillStyle='rgba(40,32,14,0.85)';
      g.beginPath();g.moveTo(0,syg+30);
      for(let x=0;x<=W;x+=40)g.lineTo(x,syg+Math.sin(x*0.03+T*6)*16);
      g.lineTo(W,H+40);g.lineTo(0,H+40);g.fill();
      g.fillStyle='#e8c04a';
      for(let i=0;i<14;i++){
        g.beginPath();g.arc((i*67+Math.sin(T*9+i)*30+W)%W,syg+10+Math.sin(T*11+i*2)*22,4,0,7);g.fill();}
    }
  }
  // 主角
  {
    const px=sx(P.x), py=sy(P.y);
    g.save();g.translate(px,py);
    if(P.inv>0&&Math.sin(T*30)>0)g.globalAlpha=0.4;
    if(P.mode==='swing')g.rotate(P.th*0.8);
    if(P.mode==='float')g.rotate(Math.sin(T*3)*0.12);
    g.fillStyle='#4a5a78';g.fillRect(-11,-42,22,28);
    g.fillStyle='#f0c8a0';g.beginPath();g.arc(0,-60,18,0,7);g.fill();
    g.fillStyle='#3a3444';g.beginPath();g.arc(0,-67,17,Math.PI,0);g.fill();
    g.fillStyle='#222';g.beginPath();g.arc(P.dir*7,-60,2.4,0,7);g.fill();
    g.strokeStyle='#3a4258';g.lineWidth=5;
    if(P.mode==='swing'){
      g.beginPath();g.moveTo(-5,-14);g.lineTo(-12,4);g.moveTo(5,-14);g.lineTo(12,4);g.stroke();
      g.strokeStyle='#f0c8a0';g.beginPath();g.moveTo(0,-42);g.lineTo(0,-78);g.stroke();
    } else if(P.mode==='float'){
      g.beginPath();g.moveTo(-5,-14);g.lineTo(-10,2+Math.sin(T*6)*4);g.moveTo(5,-14);g.lineTo(10,2-Math.sin(T*6)*4);g.stroke();
      g.strokeStyle='#f0c8a0';g.beginPath();g.moveTo(0,-42);g.lineTo(0,-80);g.stroke();
    } else {
      g.beginPath();g.moveTo(-5,-14);g.lineTo(-7,0);g.moveTo(5,-14);g.lineTo(7,0);g.stroke();
    }
    g.restore();
    if(P.mode==='float'){
      const fy=py-92;
      g.strokeStyle='rgba(240,244,255,0.95)';g.lineWidth=2.5;
      for(let a=0;a<7;a++){const aa=a*0.9+T*0.5;
        g.beginPath();g.moveTo(px,fy);g.lineTo(px+Math.cos(aa)*24,fy+Math.sin(aa)*24);g.stroke();}
      g.fillStyle='#f0f4ff';g.beginPath();g.arc(px,fy,8,0,7);g.fill();
    }
  }
  // 孢子尘
  g.fillStyle='rgba(220,255,190,0.35)';
  for(let i=0;i<16;i++){
    const dx2=(i*97+Math.sin(T*0.7+i)*40)%W;
    const dy2=(H-((i*173+T*26)%(H+80)))+Math.sin(T+i)*10;
    g.beginPath();g.arc(dx2,dy2,2.2,0,7);g.fill();
  }
  for(const p of parts){g.globalAlpha=1-p.life/p.max;g.fillStyle=p.col;
    g.fillRect(sx(p.x)-3,sy(p.y)-3,6,6);}
  g.globalAlpha=1;
}

// 正常尺寸场景:林间空地+小树苗(就是那棵"巨树")+古井
function drawNormal(){
  const sky=g.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#78a864');sky.addColorStop(0.6,'#5a8a4e');sky.addColorStop(1,'#3e6238');
  g.fillStyle=sky;g.fillRect(0,0,W,H);
  // 远树
  g.fillStyle='rgba(40,70,36,0.9)';
  for(const [tx,tw2,th2] of [[80,50,420],[240,70,520],[640,55,460]]){
    g.fillRect(tx-tw2/2,1000-th2,tw2,th2);
    g.beginPath();g.arc(tx,1000-th2-40,tw2*1.6,0,7);g.fill();
  }
  // 地面
  g.fillStyle='#5e7a42';g.fillRect(0,1000,W,H-1000);
  g.fillStyle='#6e8a4e';for(let x=0;x<W;x+=70)g.fillRect(x,1000,60,10);
  // 小树苗(闪着微光=刚才那棵"巨树")
  {
    const gl=0.5+0.3*Math.sin(T*3);
    g.strokeStyle='#4e3a26';g.lineWidth=7;
    g.beginPath();g.moveTo(180,1000);g.lineTo(180,946);g.stroke();
    g.fillStyle='#5e8e3e';
    for(const [dx2,dy2,r2] of [[-16,-64,18],[14,-70,20],[0,-88,22]]){
      g.beginPath();g.arc(180+dx2,1000+dy2,r2,0,7);g.fill();}
    g.fillStyle=`rgba(255,240,150,${gl*0.5})`;
    g.beginPath();g.arc(180,930,40,0,7);g.fill();
  }
  // 古井
  {
    const wx2=560;
    g.fillStyle='#8a8276';g.fillRect(wx2-56,940,112,60);
    g.fillStyle='#6e6a60';for(let x=wx2-56;x<wx2+56;x+=28)g.fillRect(x,940,24,14);
    g.fillStyle='#1c1410';g.beginPath();g.ellipse(wx2,944,44,12,0,0,7);g.fill();
    g.strokeStyle='#4e3a26';g.lineWidth=7;
    g.beginPath();g.moveTo(wx2-52,940);g.lineTo(wx2-52,850);g.moveTo(wx2+52,940);g.lineTo(wx2+52,850);g.stroke();
    g.fillStyle='#5e4630';g.beginPath();g.moveTo(wx2-68,850);g.lineTo(wx2,812);g.lineTo(wx2+68,850);g.fill();
    const gl=0.5+0.4*Math.sin(T*2.4);
    g.fillStyle=`rgba(150,230,210,${gl*0.6})`;g.beginPath();g.ellipse(wx2,944,30,8,0,0,7);g.fill();
  }
  // 主角(正常大小=画大一号)
  if(!N.inWell||N.y>500){
    const px=N.x, py=Math.min(N.y,1000);
    const yy=N.inWell?N.y:py;
    g.save();g.translate(px,H-140-(yy-1000)+ (1000-yy>0?0:0));
    g.translate(0,-(yy-1000));
    g.restore();
    g.save();g.translate(px,(H-140)-(yy-1000));
    if(N.inWell)g.globalAlpha=Math.max(0,(N.y-400)/600);
    g.fillStyle='#4a5a78';g.fillRect(-16,-62,32,42);
    g.fillStyle='#f0c8a0';g.beginPath();g.arc(0,-88,26,0,7);g.fill();
    g.fillStyle='#3a3444';g.beginPath();g.arc(0,-98,25,Math.PI,0);g.fill();
    g.fillStyle='#222';g.beginPath();g.arc(N.dir*10,-88,3.4,0,7);g.fill();
    g.strokeStyle='#3a4258';g.lineWidth=7;
    g.beginPath();g.moveTo(-8,-20);g.lineTo(-10,0);g.moveTo(8,-20);g.lineTo(10,0);g.stroke();
    g.restore();
  }
}

function draw(){
  g.save();
  if(shake>0)g.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  if(MODE==='micro'){
    drawMicro();
  } else if(MODE==='zoom'){
    // 还原演出:整个微缩世界绕主角缩小,白光过渡
    const k=Math.max(0.10,1-(zoomT/2.2)*0.9);
    const cx3=sx(P.x), cy3=sy(P.y)-40;
    g.save();
    g.translate(cx3,cy3);g.scale(k,k);g.translate(-cx3,-cy3);
    drawMicro();
    g.restore();
    const wA=Math.max(0,(zoomT-1.4)/1.2);
    g.fillStyle=`rgba(255,250,230,${wA})`;g.fillRect(0,0,W,H);
  } else {
    drawNormal();
  }
  // HUD
  for(let i=0;i<3;i++){g.fillStyle=i<P.hp?'#e85a5a':'#443a4c';
    g.beginPath();const hx=34+i*40,hy=36;
    g.arc(hx-7,hy-4,9,0,7);g.arc(hx+7,hy-4,9,0,7);
    g.moveTo(hx-15,hy);g.lineTo(hx,hy+16);g.lineTo(hx+15,hy);g.fill();}
  if(MODE==='micro'){
    g.fillStyle='#c8ffb0';g.font='24px monospace';
    g.fillText('高度 '+(P.y/100|0)+'m',34,86);
  }
  g.fillStyle='#ff9a8a';g.beginPath();g.arc(44,118,9,0,7);g.fill();
  g.fillStyle='#fff';g.font='20px monospace';g.fillText('×'+coins,60,126);
  if(GOD){g.fillStyle='rgba(150,230,180,0.9)';g.font='20px monospace';g.fillText('无敌 ON(按G关)',W-220,40);}
  if(msgT>0){g.font='26px sans-serif';const w2=g.measureText(msg).width;
    g.fillStyle='rgba(14,20,10,0.75)';g.fillRect(W/2-w2/2-20,150,w2+40,48);
    g.fillStyle='#e8ffb0';g.textAlign='center';g.fillText(msg,W/2,183);g.textAlign='left';}
  if(P.dead)ov('摔晕了…','按跳跃键从萤火虫处再来');
  if(P.win)ov('入井!','微缩历险结束 · 接第6关「井道下降」 · 按跳跃键重玩');
  g.restore();
}
function ov(t1,t2){
  g.fillStyle='rgba(10,16,8,0.72)';g.fillRect(0,0,W,H);
  g.fillStyle='#e8ffb0';g.font='52px sans-serif';g.textAlign='center';
  g.fillText(t1,W/2,H/2-30);
  g.fillStyle='#cfe6c6';g.font='24px sans-serif';g.fillText(t2,W/2,H/2+30);g.textAlign='left';
}
let last=0;
function loop(ts){
  const dt=Math.min(0.033,(ts-last)/1000||0.016);last=ts;
  step(dt);draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
